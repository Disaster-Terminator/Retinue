name: CI

on:
  pull_request:
    branches:
      - feature/spawn-claude-code
  push:
    branches:
      - feature/spawn-claude-code
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-build:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Validate npm package contents
        run: npm pack --dry-run --json

      - name: CI gate summary
        if: always()
        run: |
          {
            echo "### CI gate checklist (Node ${{ matrix.node-version }})"
            echo
            echo "- ✅ `npm ci`"
            echo "- ✅ `npm run typecheck`"
            echo "- ✅ `npm test`"
            echo "- ✅ `npm run build`"
            echo "- ✅ `npm pack --dry-run --json`"
          } >> "$GITHUB_STEP_SUMMARY"
