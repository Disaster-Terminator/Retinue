name: CI

on:
  pull_request:
    branches:
      - feature/spawn-claude-code
  push:
    branches:
      - feature/spawn-claude-code
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-build:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Step summary: install
        run: |
          {
            echo "### CI progress (Node ${{ matrix.node-version }})"
            echo "- ✅ \\`npm ci\\` completed"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Typecheck
        run: npm run typecheck

      - name: Step summary: typecheck
        run: echo "- ✅ \\`npm run typecheck\\` completed" >> "$GITHUB_STEP_SUMMARY"

      - name: Run tests
        run: npm test

      - name: Step summary: tests
        run: echo "- ✅ \\`npm test\\` completed" >> "$GITHUB_STEP_SUMMARY"

      - name: Build package
        run: npm run build

      - name: Step summary: build
        run: echo "- ✅ \\`npm run build\\` completed" >> "$GITHUB_STEP_SUMMARY"

      - name: Validate npm package contents
        run: npm pack --dry-run --json

      - name: Step summary: package dry-run
        run: |
          {
            echo "- ✅ \\`npm pack --dry-run --json\\` completed"
            echo
            echo "All deterministic CI gates ran unchanged for this matrix job."
          } >> "$GITHUB_STEP_SUMMARY"
