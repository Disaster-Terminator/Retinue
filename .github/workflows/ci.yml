name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm run typecheck
      - name: Check generated artifacts
        run: pnpm run check:generated
      - name: Test
        run: pnpm test
      - name: Verify package
        run: pnpm run verify:package
      - name: Smoke package artifacts
        run: pnpm run smoke:package
